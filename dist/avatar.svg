<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 138" shape-rendering="crispEdges" role="img" aria-label="Pixel art character avatar">

  <!-- ══════════════════════════════
       HAIR
  ══════════════════════════════ -->
  <!-- row 0: cols 4-11 -->
  <rect x="24" y="0"  width="48" height="6" fill="#2d1900"/>
  <!-- row 1: cols 3-12 -->
  <rect x="18" y="6"  width="60" height="6" fill="#2d1900"/>
  <!-- row 2: cols 2-13 -->
  <rect x="12" y="12" width="72" height="6" fill="#2d1900"/>
  <!-- row 3: left sideburn cols 2-3, right cols 12-13 -->
  <rect x="12" y="18" width="12" height="6" fill="#2d1900"/>
  <rect x="72" y="18" width="12" height="6" fill="#2d1900"/>
  <!-- row 8: jaw hair cols 3-4 and 10-11 -->
  <rect x="18" y="48" width="12" height="6" fill="#2d1900"/>
  <rect x="60" y="48" width="12" height="6" fill="#2d1900"/>

  <!-- Hair highlights (lighter top strip) -->
  <rect x="30" y="0"  width="36" height="3" fill="#4a2e08"/>
  <rect x="24" y="6"  width="12" height="3" fill="#4a2e08"/>
  <rect x="60" y="6"  width="12" height="3" fill="#4a2e08"/>

  <!-- ══════════════════════════════
       SKIN – face & neck
  ══════════════════════════════ -->
  <!-- row 3: forehead cols 4-11 -->
  <rect x="24" y="18" width="48" height="6" fill="#f5c49a"/>
  <!-- row 4: brow area cols 3-12 -->
  <rect x="18" y="24" width="60" height="6" fill="#f5c49a"/>
  <!-- row 5: eye row – skin on sides / between eyes -->
  <rect x="18" y="30" width="12" height="6" fill="#f5c49a"/>
  <rect x="36" y="30" width="18" height="6" fill="#f5c49a"/>
  <rect x="60" y="30" width="18" height="6" fill="#f5c49a"/>
  <!-- row 6: mid-face cols 3-12 -->
  <rect x="18" y="36" width="60" height="6" fill="#f5c49a"/>
  <!-- row 7: lower face cols 3-5 and 9-12 (mouth gap in middle) -->
  <rect x="18" y="42" width="18" height="6" fill="#f5c49a"/>
  <rect x="54" y="42" width="24" height="6" fill="#f5c49a"/>
  <!-- row 8: chin cols 5-9 -->
  <rect x="30" y="48" width="30" height="6" fill="#f5c49a"/>
  <!-- row 9: neck cols 5-9 -->
  <rect x="30" y="54" width="30" height="6" fill="#f5c49a"/>
  <!-- hands: col 1 and col 14 at row 14 -->
  <rect x="6"  y="84" width="6"  height="6" fill="#f5c49a"/>
  <rect x="84" y="84" width="6"  height="6" fill="#f5c49a"/>

  <!-- ══════════════════════════════
       EYEBROWS
  ══════════════════════════════ -->
  <rect x="30" y="24" width="6" height="3" fill="#2d1900"/>
  <rect x="54" y="24" width="6" height="3" fill="#2d1900"/>

  <!-- ══════════════════════════════
       EYES
  ══════════════════════════════ -->
  <!-- left eye col 5 -->
  <rect x="30" y="30" width="6" height="6" fill="#003d99"/>
  <!-- right eye col 9 -->
  <rect x="54" y="30" width="6" height="6" fill="#003d99"/>
  <!-- eye highlights (top-left 3×3) -->
  <rect x="30" y="30" width="3" height="3" fill="#5577ff"/>
  <rect x="54" y="30" width="3" height="3" fill="#5577ff"/>

  <!-- ══════════════════════════════
       MOUTH
  ══════════════════════════════ -->
  <!-- lips cols 6-8 -->
  <rect x="36" y="42" width="18" height="6" fill="#c25544"/>
  <!-- teeth (upper half of mouth) -->
  <rect x="38" y="42" width="14" height="3" fill="#ffe8e8"/>

  <!-- ══════════════════════════════
       SHIRT
  ══════════════════════════════ -->
  <!-- row 10 (y=60): shirt base cols 4-11 -->
  <rect x="24" y="60" width="48" height="6" fill="#3355cc"/>
  <!-- collar highlight left / right -->
  <rect x="24" y="60" width="12" height="6" fill="#aabbff"/>
  <rect x="60" y="60" width="12" height="6" fill="#aabbff"/>
  <!-- V-neck opening shows neck skin (col 7-8) -->
  <rect x="42" y="60" width="12" height="6" fill="#f5c49a"/>

  <!-- row 11: cols 3-12 -->
  <rect x="18" y="66" width="60" height="6" fill="#3355cc"/>
  <!-- row 12: cols 2-13 -->
  <rect x="12" y="72" width="72" height="6" fill="#3355cc"/>
  <!-- row 13: arms wide cols 1-14 -->
  <rect x="6"  y="78" width="84" height="6" fill="#3355cc"/>
  <!-- row 14: cols 2-13 (hands at cols 1 and 14 drawn above) -->
  <rect x="12" y="84" width="72" height="6" fill="#3355cc"/>

  <!-- shirt shadow (right side depth) -->
  <rect x="72" y="66" width="6"  height="12" fill="#1a3399"/>
  <!-- shirt highlight (left edge) -->
  <rect x="12" y="72" width="6"  height="6"  fill="#4466dd"/>

  <!-- chest emblem: small yellow diamond -->
  <rect x="44" y="68" width="4"  height="2"  fill="#ddaa00"/>
  <rect x="42" y="70" width="8"  height="2"  fill="#ddaa00"/>
  <rect x="44" y="72" width="4"  height="2"  fill="#ddaa00"/>

  <!-- ══════════════════════════════
       BELT
  ══════════════════════════════ -->
  <!-- belt strip cols 3-12 -->
  <rect x="18" y="90" width="60" height="6" fill="#3d2800"/>
  <!-- buckle cols 7-8 -->
  <rect x="42" y="90" width="12" height="6" fill="#ddaa00"/>
  <!-- buckle holes -->
  <rect x="45" y="91" width="3"  height="4" fill="#3d2800"/>
  <rect x="48" y="91" width="3"  height="4" fill="#3d2800"/>

  <!-- ══════════════════════════════
       PANTS
  ══════════════════════════════ -->
  <!-- rows 16-18 full legs cols 3-12 -->
  <rect x="18" y="96"  width="60" height="18" fill="#1a2d54"/>
  <!-- top edge highlight -->
  <rect x="18" y="96"  width="60" height="2"  fill="#2d4880"/>
  <!-- crease down centre -->
  <rect x="45" y="96"  width="3"  height="18" fill="#142240"/>
  <!-- row 19: legs split (gap cols 7-8) -->
  <rect x="18" y="114" width="24" height="6"  fill="#1a2d54"/>
  <rect x="54" y="114" width="24" height="6"  fill="#1a2d54"/>

  <!-- ══════════════════════════════
       BOOTS
  ══════════════════════════════ -->
  <!-- rows 20-21: left boot cols 3-6, right boot cols 9-12 -->
  <rect x="18" y="120" width="24" height="12" fill="#181200"/>
  <rect x="54" y="120" width="24" height="12" fill="#181200"/>
  <!-- boot toe highlights -->
  <rect x="18" y="120" width="8"  height="4"  fill="#2e2500"/>
  <rect x="54" y="120" width="8"  height="4"  fill="#2e2500"/>
  <!-- row 22: soles wider (cols 2-7 and cols 8-13) -->
  <rect x="12" y="132" width="30" height="6"  fill="#181200"/>
  <rect x="48" y="132" width="30" height="6"  fill="#181200"/>
  <!-- sole bottom highlight edge -->
  <rect x="12" y="135" width="30" height="3"  fill="#2e2500"/>
  <rect x="48" y="135" width="30" height="3"  fill="#2e2500"/>

</svg>
